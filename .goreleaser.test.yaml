version: 2

project_name: ggbond

before:
  hooks:
    - go mod tidy -C backend

builds:
  - id: ggbond
    dir: backend
    main: ./cmd/server
    binary: ggbond
    flags:
      - -tags=embed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
      - -X main.BuildType=release

# No archives for test branch
archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_test_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  disable: true

# Docker images
dockers:
  # DockerHub images
  - id: amd64
    goos: linux
    goarch: amd64
    skip_push: '{{ if eq .Env.DOCKERHUB_USERNAME "skip" }}true{{ else }}false{{ end }}'
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/ggbond:test-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version=test"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"

  - id: arm64
    goos: linux
    goarch: arm64
    skip_push: '{{ if eq .Env.DOCKERHUB_USERNAME "skip" }}true{{ else }}false{{ end }}'
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/ggbond:test-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version=test"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"

  # GHCR images
  - id: ghcr-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/ggbond:test-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version=test"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}"

  - id: ghcr-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/ggbond:test-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version=test"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}"

# Docker manifests for multi-arch support
docker_manifests:
  # DockerHub manifests
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/ggbond:test"
    skip_push: '{{ if eq .Env.DOCKERHUB_USERNAME "skip" }}true{{ else }}false{{ end }}'
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/ggbond:test-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/ggbond:test-arm64"

  # GHCR manifests
  - name_template: "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/ggbond:test"
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/ggbond:test-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/ggbond:test-arm64"

release:
  github:
    owner: "{{ .Env.GITHUB_REPO_OWNER }}"
    name: "{{ .Env.GITHUB_REPO_NAME }}"
  mode: replace
  draft: false
  prerelease: true
  make_latest: false
  name_template: "GGbond Test Build {{.Date}}"
