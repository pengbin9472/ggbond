name: Test Release

on:
  push:
    branches:
      - test
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="test-${SHORT_SHA}"
          echo "${VERSION}" > backend/cmd/server/VERSION
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # Build frontend
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      # Build Go binaries
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build binaries
        run: |
          cd backend
          LDFLAGS="-s -w -X main.Commit=${{ github.sha }} -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.BuildType=test"

          # linux/amd64
          echo "Building linux/amd64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags=embed -ldflags="${LDFLAGS}" -o ../dist/ggbond_linux_amd64/ggbond ./cmd/server

          # linux/arm64
          echo "Building linux/arm64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags=embed -ldflags="${LDFLAGS}" -o ../dist/ggbond_linux_arm64/ggbond ./cmd/server

      - name: Create archives and checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd dist

          # Copy deploy files into each archive directory
          for dir in ggbond_linux_*/; do
            cp -r ../deploy "$dir/"
            cp ../LICENSE* "$dir/" 2>/dev/null || true
            cp ../README* "$dir/" 2>/dev/null || true
          done

          # Create tar.gz archives
          tar -czf "ggbond_${VERSION}_linux_amd64.tar.gz" -C ggbond_linux_amd64 .
          tar -czf "ggbond_${VERSION}_linux_arm64.tar.gz" -C ggbond_linux_arm64 .

          # Generate checksums
          sha256sum ggbond_${VERSION}_*.tar.gz > checksums.txt

          echo "Archives created:"
          ls -lh *.tar.gz checksums.txt

      # Create GitHub Release
      - name: Delete existing test release
        run: |
          gh release delete test --yes 2>/dev/null || true
          git push origin :refs/tags/test 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create test \
            --title "GGbond Test (${VERSION})" \
            --notes "Test build from \`test\` branch @ ${{ github.sha }}

          > This is an automated test release. Not for production use.

          **Version:** \`${VERSION}\`
          **Commit:** [\`${{ steps.version.outputs.short_sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          ## Install

          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/test/deploy/install-test.sh | sudo bash -s -- upgrade
          \`\`\`
          " \
            --target test \
            --prerelease \
            dist/ggbond_${VERSION}_linux_amd64.tar.gz \
            dist/ggbond_${VERSION}_linux_arm64.tar.gz \
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/ggbond:test
            ghcr.io/${{ steps.lowercase.outputs.owner }}/ggbond:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
